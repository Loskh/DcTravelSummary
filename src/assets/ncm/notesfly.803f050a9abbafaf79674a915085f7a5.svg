<?xml version="1.0" encoding="UTF-8"?>
<svg width="750px" height="1334px" viewBox="0 0 750 1334" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <g id="notesfly" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <image id="note1" x="0" y="0" width="59" height="37" xlink:href="data:image/png;base64,"></image>
        <image id="note2" x="0" y="0" width="59" height="37" xlink:href="data:image/png;base64,"></image>
        <image id="note3" x="0" y="0" width="59" height="37" xlink:href="data:image/png;base64,"></image>

        <path d="M417.410156,993.300781 C506.996094,983.016927 568.695313,939.261719 602.507812,862.035156" id="pt1"></path>
        <path d="M419.800781,1011.09766 C526.378906,1011.09766 597.951823,973.282552 634.519531,897.652344" id="pt2"></path>
