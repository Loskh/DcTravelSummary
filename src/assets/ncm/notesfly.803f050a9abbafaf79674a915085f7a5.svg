                    begin="-0.6666s"
                    dur="2s"
                    values="0;1;1;1;0"
                    repeatCount="indefinite"
                    fill="freeze"
                    />  
    <animateMotion xlink:href="#note2" begin="-1.3333s" dur="2s" rotate="auto" repeatCount="indefinite">
